spring.application.name=kardex-backend
server.port=8080

# Configuración de la Base de Datos (PostgreSQL en Render)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# 🔥 CRÍTICO: Registrar el SchemaInterceptor para multi-tenancy
spring.jpa.properties.hibernate.tenant_identifier_resolver=com.universidad.kardex_backend.config.SchemaInterceptor

# Inicialización
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.com.universidad.kardex_backend.config=DEBUG