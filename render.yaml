services:
  - type: web
    name: kardex-backend
    runtime: image
    repo: https://github.com/Marcoxxz/kardex-backend.git
    plan: free
    envVars:
      - key: DB_URL
        value: ${DB_URL}
      - key: DB_USERNAME
        value: ${DB_USERNAME}
      - key: DB_PASSWORD
        value: ${DB_PASSWORD}
      - key: SPRING_PROFILES_ACTIVE
        value: production
    healthCheckPath: /actuator/health
    autoDeploy: true
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/*.jar